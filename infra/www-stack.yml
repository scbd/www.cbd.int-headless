version: "3.8"

services:
  # ===========================================
  # Router / Reverse Proxy (only exposed service)
  # ===========================================
  router:
    hostname: router
    image: ${NGINX_IMAGE:-scbd/www-router:master}
    environment:
      - NUXT_HOST=nuxt
      - NUXT_PORT=3000
      - DRUPAL_HOST=drupal
      - DRUPAL_PORT=80
      - LEGACY_CMS_HOST=${LEGACY_CMS_HOST:-legacy-cms}
      - LEGACY_CMS_PORT=${LEGACY_CMS_PORT:-80}
      - LEGACY_WWW_FALLBACK_URL=${LEGACY_WWW_FALLBACK_URL:-https://archive.cbd.int}
      - GAIA_DOCS_S3_ENDPOINT=${GAIA_S3_ENDPOINT:-s3.us-east-1.amazonaws.com}
      - API_HOST=${API_HOST:-api.cbd.int}
      - API_PORT=${API_PORT:-443}
    ports:
      - target: 80
        published: ${PORT:-3030}
        protocol: tcp
        mode: host
    networks:
      - webgateway
      - backend
    depends_on:
      - nuxt
      - drupal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
      # placement:
      #   constraints:
      #     - node.role == worker
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.website-preview-www.rule=Host(`preview-www.cbd.int`)"
        - "traefik.http.services.website-preview-www.loadbalancer.server.port=80"

  # ===========================================
  # Nuxt Frontend Application
  # ===========================================
  nuxt:
    hostname: nuxt
    image: ${NUXT_IMAGE:-scbd/www-app:master}
    environment:
      - NODE_ENV=production
      - NUXT_DRUPAL_BASE_URL=http://drupal
      - NUXT_API_BASE_URL=https://${API_HOST:-api.cbd.int}
      - NUXT_ORT_URL=https://ort.cbd.int
    networks:
      - backend
    deploy:
      replicas: 1
      # placement:
      #   constraints:
      #     - node.role == worker
      restart_policy:
        condition: on-failure

  # ===========================================
  # Drupal Headless CMS
  # ===========================================
  drupal:
    hostname: drupal
    image: ${DRUPAL_IMAGE:-scbd/www-cms:master}
    volumes:
      - drupal_files:/opt/drupal/web/sites/default/files
      - drupal_sync:/var/drupal/sync
    networks:
      - backend
      - db_net
    secrets:
      - db_password
      - redis_password
      - hash_salt
    environment:
      - DRUPAL_DATABASE_HOST=${DRUPAL_DATABASE_HOST}
      - DRUPAL_DATABASE_PORT=${DRUPAL_DATABASE_PORT:-3306}
      - DRUPAL_DATABASE_DB_NAME=${DRUPAL_DATABASE_DB_NAME}
      - DRUPAL_DATABASE_USERNAME=${DRUPAL_DATABASE_USERNAME}
      - DRUPAL_REDIS_HOST=redis
      - DRUPAL_REDIS_PORT=6379
      - DRUPAL_REDIS_DB=0
      - DRUPAL_REDIS_CACHE_PREFIX=cbd_
      - DRUPAL_TRUSTED_HOST=.*
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      # placement:
      #   constraints:
      #     - node.role == worker

  # ===========================================
  # Legacy CMS stub (local/dev only — in production this is an external service
  # on the webgateway network provided by the host infrastructure)
  # ===========================================
  legacy-cms:
    image: nginx:alpine
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ===========================================
  # Redis Cache (for Drupal)
  # ===========================================
  redis:
    image: redis:8.2.1
    networks:
      - backend
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      # placement:
      #   constraints:
      #     - node.role == worker

# ===========================================
# Networks
# ===========================================
networks:
  webgateway:
    # Connect to external network for webgateway/legacy-cms
    external: true
    # name: private-stack-network

  backend:
    driver: overlay

  db_net:
    external: true  # Shared with the DB stack

# ===========================================
# Volumes
# ===========================================
volumes:
  drupal_files:
    driver: local
    # driver_opts:
    #   type: nfs
    #   # EFS_FILES_DNS must be set at deploy time, e.g.:
    #   #   EFS_FILES_DNS=<fs-id>.efs.<region>.amazonaws.com docker stack deploy ...
    #   o: "addr=${EFS_FILES_DNS},nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport"
    #   device: ":/www/files"  # EFS root — maps to /opt/drupal/web/sites/default/files

  drupal_sync:
    driver: local
    # driver_opts:
    #   type: nfs
    #   # EFS_SYNC_DNS must be set at deploy time, e.g.:
    #   #   EFS_SYNC_DNS=<fs-id>.efs.<region>.amazonaws.com docker stack deploy ...
    #   o: "addr=${EFS_SYNC_DNS},nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport"
    #   device: ":/www/drupal/sync"  # EFS root — maps to /var/drupal/sync

  redis_data:
    driver: local

# ===========================================
# Secrets
# ===========================================
# External secret names use the www_ prefix.
secrets:
  db_password:
    external: true
    name: www_db_password
  redis_password:
    external: true
    name: www_redis_password
  hash_salt:
    external: true
    name: www_hash_salt
