# Environment Variables (configured in CircleCI project settings):
#
# Docker Hub Authentication (from CircleCI context: docker-hub):
# - DOCKER_USER: Docker Hub username for pushing images
# - DOCKER_PASS: Docker Hub password or access token
#
# Deployment Webhooks (Optional):
# - DEPLOY_WEBHOOK_URL_master: Webhook URL(s) for master branch deployments (comma-separated for multiple)
# - DEPLOY_WEBHOOK_URL_dev:    Webhook URL(s) for dev branch deployments (comma-separated for multiple)

version: 2.1

jobs:
  test-unit:
    resource_class: small
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - restore_cache:
          keys:
            - yarn-deps-v3-{{ checksum "yarn.lock" }}
            - yarn-deps-v3-
      - run:
          name: Install dependencies
          command: yarn install --frozen-lockfile --network-timeout 100000 --network-concurrency 1
      - save_cache:
          key: yarn-deps-v3-{{ checksum "yarn.lock" }}
          paths:
            - node_modules
            - ~/.cache/yarn
      - run:
          name: Run lint
          command: yarn lint
      - run:
          name: Run unit tests
          command: yarn test

  test-e2e:
    resource_class: medium
    docker:
      - image: cimg/node:lts-browsers
    environment:
      CI: "true"
      NUXT_DRUPAL_BASE_URL: https://cms.staging.drupal.www.infra.cbd.int
      NUXT_API_BASE_URL: https://api.cbd.int
      NUXT_ORT_URL: https://ort.cbd.int
      NUXT_PUBLIC_IFRAME_CALENDAR_URL: https://www.staging.cbd.int/calendar-of-activities-and-actions/calendar-of-activities
    steps:
      - checkout
      - restore_cache:
          keys:
            - yarn-deps-v3-{{ checksum "yarn.lock" }}
            - yarn-deps-v3-
      - run:
          name: Install dependencies
          command: yarn install --frozen-lockfile --network-timeout 100000 --network-concurrency 1
      - save_cache:
          key: yarn-deps-v3-{{ checksum "yarn.lock" }}
          paths:
            - node_modules
            - ~/.cache/yarn
      - restore_cache:
          keys:
            - playwright-browsers-v1-{{ checksum "yarn.lock" }}
            - playwright-browsers-v1-
      - run:
          name: Install Playwright browsers
          command: npx playwright install --with-deps chromium
          no_output_timeout: 5m
      - save_cache:
          key: playwright-browsers-v1-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/ms-playwright
      - run:
          name: Build Nuxt application
          command: yarn build
          no_output_timeout: 5m
      - run:
          name: Start preview server
          command: yarn preview
          background: true
      - run:
          name: Wait for preview server
          command: |
            echo "Waiting for http://localhost:3000 ..."
            for i in $(seq 1 30); do
              if curl -s -o /dev/null -w '' http://localhost:3000; then
                echo "Server is ready"
                exit 0
              fi
              echo "  attempt $i/30 …"
              sleep 2
            done
            echo "Server failed to start within 60s"
            exit 1
      - run:
          name: Run e2e tests
          command: npx playwright test --reporter=list
          no_output_timeout: 1m
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
      - store_artifacts:
          path: test-results
          destination: test-results

  build-only:
    resource_class: small
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build www-nuxt image
          command: |
            docker buildx create --use --name circleci-builder
            docker buildx build --platform linux/amd64 \
              --cache-from type=registry,ref=scbd/www-nuxt:master \
              --cache-from type=registry,ref=scbd/www-nuxt:dev \
              -t scbd/www-nuxt:$CIRCLE_BRANCH --load .
      - run:
          name: Build www-router image
          command: |
            docker buildx build --platform linux/amd64 \
              --cache-from type=registry,ref=scbd/www-router:master \
              --cache-from type=registry,ref=scbd/www-router:dev \
              -t scbd/www-router:$CIRCLE_BRANCH --load ./infra/router
      - run:
          name: Build www-drupal image
          command: |
            docker buildx build --platform linux/amd64 \
              --cache-from type=registry,ref=scbd/www-drupal:master \
              --cache-from type=registry,ref=scbd/www-drupal:dev \
              -t scbd/www-drupal:$CIRCLE_BRANCH --load ./infra/drupal

  build-and-push:
    resource_class: small
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Determine image tag
          command: |
            if [ -n "$CIRCLE_TAG" ]; then
              echo "export IMAGE_TAG=$CIRCLE_TAG" >> $BASH_ENV
            else
              echo "export IMAGE_TAG=$CIRCLE_BRANCH" >> $BASH_ENV
            fi
      - run:
          name: Login to Docker Hub
          command: |
            echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
      - run:
          name: Build www-nuxt image
          command: |
            docker buildx create --use --name circleci-builder
            docker buildx build --platform linux/amd64 \
              --cache-from type=registry,ref=scbd/www-nuxt:$IMAGE_TAG \
              --cache-from type=registry,ref=scbd/www-nuxt:master \
              --cache-to type=registry,ref=scbd/www-nuxt:$IMAGE_TAG,mode=max \
              -t scbd/www-nuxt:$IMAGE_TAG --load .
      - run:
          name: Build www-router image
          command: |
            docker buildx build --platform linux/amd64 \
              --cache-from type=registry,ref=scbd/www-router:$IMAGE_TAG \
              --cache-from type=registry,ref=scbd/www-router:master \
              --cache-to type=registry,ref=scbd/www-router:$IMAGE_TAG,mode=max \
              -t scbd/www-router:$IMAGE_TAG --load ./infra/router
      - run:
          name: Build www-drupal image
          command: |
            docker buildx build --platform linux/amd64 \
              --cache-from type=registry,ref=scbd/www-drupal:$IMAGE_TAG \
              --cache-from type=registry,ref=scbd/www-drupal:master \
              --cache-to type=registry,ref=scbd/www-drupal:$IMAGE_TAG,mode=max \
              -t scbd/www-drupal:$IMAGE_TAG --load ./infra/drupal
      - run:
          name: Push images to Docker Hub
          command: |
            docker push scbd/www-nuxt:$IMAGE_TAG
            docker push scbd/www-router:$IMAGE_TAG
            docker push scbd/www-drupal:$IMAGE_TAG
      - run:
          name: Trigger Portainer webhooks
          command: |
            WEBHOOK_VAR="DEPLOY_WEBHOOK_URL_${CIRCLE_BRANCH}"
            WEBHOOK_URL=$(eval echo \$$WEBHOOK_VAR)
            if [ -n "$WEBHOOK_URL" ]; then
              echo "Triggering Portainer webhook(s) for branch: $CIRCLE_BRANCH"
              IFS=',' read -ra URLS \<<< "$WEBHOOK_URL"
              for url in "${URLS[@]}"; do
                url=$(echo "$url" | xargs)
                echo "  Triggering: $url"
                docker run --rm curlimages/curl:latest -X POST "$url" || echo "Webhook call to $url failed (non-critical)"
              done
            else
              echo "No webhook configured for branch: $CIRCLE_BRANCH (${WEBHOOK_VAR} not set)"
            fi

workflows:
  build-deploy:
    jobs:
      - test-unit
      - test-e2e
      - build-only:
          requires:
            - test-unit
            - test-e2e
          filters:
            branches:
              ignore:
                - dev
                - stg
                - master
      - build-and-push:
          requires:
            - test-unit
            - test-e2e
          context: docker-hub
          filters:
            branches:
              only:
                - dev
                - stg
                - master
            tags:
              only: /^\d{4}\.\d+\.\d+$/
